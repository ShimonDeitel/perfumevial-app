name: Perfume Vial
options:
  bundleIdPrefix: com.shimondeitel.perfumevial
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Perfume Vial:
    type: application
    platform: iOS
    sources:
      - path: Perfume Vial
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.perfumevial
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Perfume Vial/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Perfume VialTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Perfume VialTests
      - path: Perfume Vial.storekit
    dependencies:
      - target: Perfume Vial
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.perfumevial.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Perfume VialUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Perfume VialUITests
    dependencies:
      - target: Perfume Vial
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.perfumevial.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Perfume Vial:
    build:
      targets:
        Perfume Vial: all
        Perfume VialTests: [test]
        Perfume VialUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Perfume Vial.storekit
    test:
      config: Debug
      storeKitConfiguration: Perfume Vial.storekit
      targets:
        - Perfume VialTests
        - Perfume VialUITests
    archive:
      config: Release
